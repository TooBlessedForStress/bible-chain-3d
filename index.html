<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE ETERNAL CHAIN</title>
  <style>
    body { margin:0; overflow:hidden; background:#000000; font-family:'Georgia', serif; color:#eeeeee; }
    #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100; }
    #stats { position:absolute; top:25px; left:25px; background:rgba(15,15,15,0.95); border:1px solid #555; border-radius:12px; padding:22px; width:340px; pointer-events:auto; }
    #header { position:absolute; top:25px; right:25px; background:rgba(15,15,15,0.95); border:1px solid #555; border-radius:12px; padding:14px 24px; font-size:15px; letter-spacing:2px; pointer-events:auto; }
    #info { position:absolute; bottom:40px; left:50%; transform:translateX(-50%); background:rgba(10,10,10,0.97); color:#eee; padding:24px 32px; border:1px solid #666; border-radius:14px; display:none; z-index:200; max-width:520px; text-align:center; line-height:1.7; }
    button { background:#111; color:#eee; border:1px solid #777; padding:12px 22px; margin:5px; border-radius:8px; cursor:pointer; font-family:Georgia, serif; }
    button:hover { background:#222; border-color:#aaa; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="header">THE ETERNAL CHAIN</div>
    
    <div id="stats">
      <h2 style="margin:0 0 18px 0; font-size:22px; letter-spacing:1px;">LIVE CHAIN</h2>
      <p><strong>Total Blocks:</strong> <span id="total">6</span></p>
      <p><strong>Verses Minted:</strong> <span id="verses">6</span> / 31,102</p>
      <p><strong>HOLY Tokens:</strong> <span id="tokens">600</span></p>
      <p><strong>Progress:</strong> <span id="progress">0.02%</span></p>
      <h3 style="margin:22px 0 8px 0; color:#aaa;">Recent Verses</h3>
      <ul id="recent" style="margin:0; padding:0; list-style:none; max-height:170px; overflow-y:auto;"></ul>
    </div>

    <div id="info"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    let blocks = [
      { id: 1, ref: "Genesis 1:1", version: "KJV", text: "In the beginning God created the heaven and the earth.", creator: "7x...a1b2", timestamp: "Apr 17, 2026" },
      { id: 2, ref: "John 3:16", version: "KJV", text: "For God so loved the world, that he gave his only begotten Son.", creator: "9y...c3d4", timestamp: "Apr 17, 2026" },
      { id: 3, ref: "Psalm 23:1", version: "KJV", text: "The Lord is my shepherd; I shall not want.", creator: "3z...e5f6", timestamp: "Apr 16, 2026" },
      { id: 4, ref: "Romans 8:28", version: "KJV", text: "And we know that all things work together for good...", creator: "5k...g7h8", timestamp: "Apr 16, 2026" },
      { id: 5, ref: "Philippians 4:13", version: "KJV", text: "I can do all things through Christ who strengthens me.", creator: "2m...i9j0", timestamp: "Apr 15, 2026" },
      { id: 6, ref: "Matthew 6:33", version: "KJV", text: "Seek ye first the kingdom of God, and his righteousness.", creator: "8p...k1l2", timestamp: "Apr 15, 2026" }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Clean cinematic lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const keyLight = new THREE.PointLight(0xffffff, 1.6, 300);
    keyLight.position.set(0, 50, 40);
    scene.add(keyLight);

    // === VERTICAL 3D CROSS IN BACKGROUND ===
    const crossGroup = new THREE.Group();
    // Vertical beam (tall)
    const vBeam = new THREE.Mesh(
      new THREE.BoxGeometry(4, 110, 4),
      new THREE.MeshPhongMaterial({ color: 0xeeeeee, emissive: 0xaaaaaa, transparent: true, opacity: 0.18, shininess: 10 })
    );
    // Horizontal beam
    const hBeam = new THREE.Mesh(
      new THREE.BoxGeometry(50, 4, 4),
      new THREE.MeshPhongMaterial({ color: 0xeeeeee, emissive: 0xaaaaaa, transparent: true, opacity: 0.18, shininess: 10 })
    );
    hBeam.position.y = 22;
    crossGroup.add(vBeam);
    crossGroup.add(hBeam);
    crossGroup.position.set(0, 0, -65);   // far back
    crossGroup.rotation.y = 0.1;          // slight 3D angle
    scene.add(crossGroup);

    let blockMeshes = [];
    let autoRotate = true;

    function createChain() {
      blockMeshes.forEach(m => scene.remove(m));
      blockMeshes = [];

      const radius = 11.5;
      const heightStep = 2.2;

      blocks.forEach((block, i) => {
        const angle = i * 0.29;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius * 0.65;
        const y = i * heightStep - (blocks.length * heightStep / 2);

        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(1.85, 1.85, 1.85),
          new THREE.MeshPhongMaterial({ 
            color: 0xffffff, 
            emissive: 0xbbbbbb,
            shininess: 90
          })
        );
        mesh.position.set(x, y, z);
        mesh.userData = block;
        scene.add(mesh);
        blockMeshes.push(mesh);

        // Verse text directly on block
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#111111'; ctx.fillRect(0,0,512,128);
        ctx.font = 'bold 44px Georgia';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(block.ref, 256, 70);

        const tex = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: tex}));
        sprite.scale.set(4.8, 1.15, 1);
        sprite.position.set(x, y + 1.7, z);
        scene.add(sprite);
        mesh.userData.label = sprite;

        // Chain line
        if (i > 0) {
          const line = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([blockMeshes[i-1].position, mesh.position]),
            new THREE.LineBasicMaterial({color: 0xaaaaaa, transparent:true, opacity:0.45})
          );
          scene.add(line);
        }
      });
    }

    camera.position.set(0, 18, 42);
    camera.lookAt(0, 0, 0);

    // Mouse controls
    let dragging = false, lastX = 0;
    document.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; });
    document.addEventListener('mouseup', () => dragging = false);
    document.addEventListener('mousemove', e => {
      if (dragging) scene.rotation.y += (e.clientX - lastX) * 0.003;
      lastX = e.clientX;
    });
    document.addEventListener('wheel', e => {
      camera.position.z = Math.max(22, Math.min(75, camera.position.z + e.deltaY * 0.04));
    });

    // Click popup
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    renderer.domElement.addEventListener('click', e => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hit = raycaster.intersectObjects(blockMeshes)[0];
      if (hit) {
        const d = hit.object.userData;
        document.getElementById('info').innerHTML = `
          <strong>${d.ref} (${d.version})</strong><br><br>
          ${d.text}<br><br>
          <small>Creator: ${d.creator}<br>Block #${d.id} • ${d.timestamp}</small>
        `;
        document.getElementById('info').style.display = 'block';
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      if (autoRotate) scene.rotation.y += 0.0004;

      // Slow elegant pulse
      const pulse = 1 + Math.sin(Date.now() / 1400) * 0.055;
      blockMeshes.forEach(m => m.scale.setScalar(pulse));

      renderer.render(scene, camera);
    }

    function updateStats() {
      document.getElementById('total').textContent = blocks.length;
      document.getElementById('verses').textContent = blocks.length;
      document.getElementById('tokens').textContent = blocks.length * 100;
      document.getElementById('progress').textContent = ((blocks.length / 31102) * 100).toFixed(2) + '%';
      document.getElementById('recent').innerHTML = blocks.slice(-5).reverse().map(b => 
        `<li style="margin:7px 0;color:#ccc">#${b.id} • ${b.ref}</li>`
      ).join('');
    }

    // Controls
    const ctrl = document.createElement('div');
    ctrl.style.position = 'absolute';
    ctrl.style.bottom = '30px';
    ctrl.style.right = '30px';
    ctrl.style.zIndex = '100';
    ctrl.innerHTML = `
      <button onclick="autoRotate=!autoRotate">⏸ Auto-rotate</button>
      <button onclick="scene.rotation.y=0; camera.position.set(0,18,42)">Reset View</button>
    `;
    document.body.appendChild(ctrl);

    // Start
    createChain();
    updateStats();
    animate();
  </script>
</body>
</html>
