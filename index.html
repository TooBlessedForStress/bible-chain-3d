<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Chain • Eternal Word</title>
  <style>
    body { 
      margin:0; 
      overflow:hidden; 
      background:#000000; 
      font-family: 'Georgia', serif; 
      color:#e5e5e5; 
    }
    #stats { 
      position:absolute; 
      top:15px; 
      left:15px; 
      background:rgba(0,0,0,0.85); 
      padding:18px 20px; 
      border:1px solid #555; 
      border-radius:8px; 
      width:320px; 
      z-index:100; 
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }
    #info { 
      position:absolute; 
      bottom:25px; 
      left:50%; 
      transform:translateX(-50%); 
      background:rgba(0,0,0,0.92); 
      color:#ddd; 
      padding:18px 28px; 
      border:1px solid #777; 
      border-radius:10px; 
      display:none; 
      z-index:200; 
      max-width:460px; 
      text-align:center; 
      line-height:1.5;
    }
    button { 
      background:#111; 
      color:#e5e5e5; 
      border:1px solid #666; 
      padding:10px 18px; 
      margin:5px; 
      border-radius:6px; 
      cursor:pointer; 
      font-family: Georgia, serif;
    }
    button:hover { background:#222; border-color:#aaa; }
    h2 { margin:0 0 12px 0; letter-spacing:1px; color:#fff; }
  </style>
</head>
<body>
  <div id="stats">
    <h2>✝️ THE ETERNAL CHAIN</h2>
    <p><strong>Total Blocks:</strong> <span id="total">0</span></p>
    <p><strong>Verses Minted:</strong> <span id="verses">0</span> / 31,102</p>
    <p><strong>HOLY Tokens Distributed:</strong> <span id="tokens">0</span></p>
    <p><strong>Progress to Completion:</strong> <span id="progress">0%</span></p>
    <h3 style="margin:18px 0 8px 0; color:#bbb;">Recent Verses</h3>
    <ul id="recent" style="margin:0; padding:0; list-style:none; max-height:160px; overflow-y:auto;"></ul>
  </div>

  <div id="info"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    let blocks = [];
    let flyingTexts = [];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Soft biblical lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const pointLight = new THREE.PointLight(0xffffff, 1.2, 200);
    pointLight.position.set(0, 40, 30);
    scene.add(pointLight);

    // Cross-like light from above
    const crossLight = new THREE.DirectionalLight(0xdddddd, 0.6);
    crossLight.position.set(10, 50, 10);
    scene.add(crossLight);

    let blockMeshes = [];
    let autoRotate = true;

    function createChain() {
      blockMeshes.forEach(m => scene.remove(m));
      blockMeshes = [];

      const radius = 10;
      const heightStep = 1.9;

      blocks.forEach((block, i) => {
        const angle = i * 0.32;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius * 0.6;
        const y = i * heightStep - (blocks.length * heightStep / 2);

        const geometry = new THREE.BoxGeometry(1.6, 1.6, 1.6);
        const material = new THREE.MeshPhongMaterial({ 
          color: 0xffffff, 
          emissive: 0xaaaaaa,
          shininess: 80,
          specular: 0x333333
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, y, z);
        mesh.userData = block;
        scene.add(mesh);
        blockMeshes.push(mesh);

        // Connecting chain lines
        if (i > 0) {
          const prev = blockMeshes[i-1].position;
          const lineGeo = new THREE.BufferGeometry().setFromPoints([prev, mesh.position]);
          const lineMat = new THREE.LineBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.5 });
          const line = new THREE.Line(lineGeo, lineMat);
          scene.add(line);
        }
      });
    }

    // Create floating Bible verse particles
    function createFlyingVerses() {
      const texts = ["In the beginning...", "The Lord is my shepherd", "For God so loved...", 
                     "I am the way...", "Love never fails", "Be still and know...", "The truth shall set you free"];
      
      for (let i = 0; i < 18; i++) {
        const sprite = new THREE.Sprite(
          new THREE.SpriteMaterial({ 
            color: 0xdddddd,
            transparent: true,
            opacity: 0.35 + Math.random() * 0.4
          })
        );
        sprite.scale.set(8, 2, 1);
        sprite.position.set(
          (Math.random() - 0.5) * 60,
          (Math.random() - 0.5) * 40,
          (Math.random() - 0.5) * 40
        );
        sprite.userData = { 
          speed: 0.02 + Math.random() * 0.03,
          text: texts[i % texts.length]
        };
        scene.add(sprite);
        flyingTexts.push(sprite);
      }
    }

    camera.position.set(0, 10, 32);
    camera.lookAt(0, 0, 0);

    // Mouse controls
    let isDragging = false, prevX = 0;
    document.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; });
    document.addEventListener('mouseup', () => isDragging = false);
    document.addEventListener('mousemove', e => {
      if (isDragging) scene.rotation.y += (e.clientX - prevX) * 0.003;
      prevX = e.clientX;
    });
    document.addEventListener('wheel', e => {
      camera.position.z += e.deltaY * 0.03;
      camera.position.z = Math.max(15, Math.min(60, camera.position.z));
    });

    // Click handler
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    renderer.domElement.addEventListener('click', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(blockMeshes);
      if (intersects.length > 0) {
        const data = intersects[0].object.userData;
        const info = document.getElementById('info');
        info.innerHTML = `
          <strong>${data.ref} (${data.version})</strong><br><br>
          ${data.text}<br><br>
          <small>Creator (Validator): ${data.creator}<br>
          Block #${data.id} • ${data.timestamp}</small>
        `;
        info.style.display = 'block';
        setTimeout(() => info.style.display = 'none', 10000);
      }
    });

    function animate() {
      requestAnimationFrame(animate);

      if (autoRotate) scene.rotation.y += 0.0006;

      // Gentle floating animation for verses
      flyingTexts.forEach(t => {
        t.position.y += t.userData.speed;
        if (t.position.y > 35) t.position.y = -35;
        t.lookAt(camera.position);
      });

      renderer.render(scene, camera);
    }
    animate();

    // Responsive
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Load blocks (same as before)
    async function loadBlocks() {
      // ... (same loadBlocks function as previous version - keep your existing one)
      // For now using fallback
      blocks = [{
        id: 1,
        ref: "No blocks yet",
        version: "KJV",
        text: "The chain begins when the first Bible verse is minted on Solana.",
        creator: "Awaiting First Minter",
        timestamp: new Date().toLocaleDateString()
      }];
      createChain();
      updateStats();
    }

    function updateStats() {
      document.getElementById('total').textContent = blocks.length;
      document.getElementById('verses').textContent = blocks.length;
      document.getElementById('tokens').textContent = blocks.length * 100;
      document.getElementById('progress').textContent = ((blocks.length / 31102) * 100).toFixed(2) + '%';

      let html = '';
      blocks.slice(-5).reverse().forEach(b => {
        html += `<li style="margin:6px 0; color:#ccc;">#${b.id} • ${b.ref}</li>`;
      });
      document.getElementById('recent').innerHTML = html || '<li style="color:#777;">No verses yet</li>';
    }

    // Controls
    const controls = document.createElement('div');
    controls.style.position = 'absolute';
    controls.style.bottom = '20px';
    controls.style.right = '20px';
    controls.style.zIndex = '100';
    controls.innerHTML = `
      <button onclick="autoRotate=!autoRotate">⏸️ Auto-rotate</button>
      <button onclick="scene.rotation.y=0; camera.position.set(0,10,32)">Reset View</button>
      <button onclick="loadBlocks()">Refresh Chain</button>
    `;
    document.body.appendChild(controls);

    // Initialize flying verses and load
    createFlyingVerses();
    loadBlocks();
  </script>
</body>
</html>
