<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERSECHAIN • Eternal Bible Chain</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body { margin:0; padding:0; overflow:hidden; background:#000; font-family:'Inter', system-ui, sans-serif; }
    canvas { display:block; }
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;
      color: white; display: flex; flex-direction: column;
    }
    .header {
      padding: 30px 40px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
      display: flex; justify-content: space-between; align-items: center; pointer-events: auto;
    }
    .title { font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; margin: 0; }
    .controls {
      position: absolute; top: 120px; right: 40px; width: 320px; background: rgba(10,10,10,0.95);
      border: 1px solid #333; border-radius: 16px; padding: 24px; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .nav {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; overflow-x: auto; padding: 12px 20px; background: rgba(10,10,10,0.95);
      border: 1px solid #333; border-radius: 9999px; pointer-events: auto; max-width: 90%;
    }
    button {
      background: #111; color: white; border: 1px solid #444; padding: 12px 24px; border-radius: 9999px;
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    button:hover { background: #222; transform: translateY(-2px); }
    .active { background: white !important; color: black !important; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="overlay">
    <div class="header">
      <div class="title">VERSECHAIN</div>
      <button onclick="mockWalletConnect()" style="background:#fff; color:#000; padding:12px 28px; border-radius:9999px; font-weight:700;">
        Connect Wallet
      </button>
    </div>

    <div class="controls">
      <div style="font-size:0.9rem; letter-spacing:2px; opacity:0.7; margin-bottom:16px;">MINT NEW VERSE BLOCK</div>
      <select id="version-select" style="width:100%; padding:14px; background:#111; border:1px solid #444; color:white; border-radius:12px; margin-bottom:20px;">
        <option value="KJV">King James Version (KJV)</option>
        <option value="ASV">American Standard Version (ASV)</option>
        <option value="WEB">World English Bible (WEB)</option>
      </select>
      <button onclick="createNewBlock()" style="width:100%; padding:18px; font-size:1.1rem;">✨ CREATE NEW BLOCK +10 HOLY</button>
    </div>

    <div class="nav" id="nav-buttons"></div>

    <div style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-size:0.8rem; opacity:0.5; white-space:nowrap;">
      ETERNAL ON-CHAIN BIBLE VERSE CHAIN • SOLANA DEVNET
    </div>
  </div>

  <script>
    let scene, camera, renderer, controls;
    let blocks = [];
    let currentIndex = 0;
    let rays = [];
    let particlesMesh;

    function init() {
      const container = document.getElementById('canvas-container');
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.1;
      controls.minDistance = 18;
      controls.maxDistance = 80;

      camera.position.set(8, 22, 35);

      scene.add(new THREE.AmbientLight(0x555555, 0.6));
      const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
      dirLight.position.set(20, 55, 30);
      scene.add(dirLight);

      createHolyBeam();
      createInitialBlocks();
      createParticles();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
      updateNavButtons();
    }

    function createHolyBeam() {
      // Central core
      const coreGeo = new THREE.CylinderGeometry(0.65, 0.85, 110, 64);
      const coreMat = new THREE.MeshBasicMaterial({ color: 0xf5e8c7, transparent: true, opacity: 0.95 });
      const core = new THREE.Mesh(coreGeo, coreMat);
      core.position.y = -18;
      scene.add(core);

      // Misty base
      const baseGeo = new THREE.PlaneGeometry(28, 28);
      const baseMat = new THREE.MeshBasicMaterial({ color: 0xf5e8c7, transparent: true, opacity: 0.55, side: THREE.DoubleSide });
      const base = new THREE.Mesh(baseGeo, baseMat);
      base.rotation.x = Math.PI / 2;
      base.position.y = -37;
      scene.add(base);

      // Hundreds of individual light beams firing upward
      rays = [];
      for (let i = 0; i < 140; i++) {
        const rayGeo = new THREE.CylinderGeometry(0.04, 0.08, 12, 8);
        const rayMat = new THREE.MeshBasicMaterial({ color: 0xf5e8c7, transparent: true, opacity: 0.7 });
        const ray = new THREE.Mesh(rayGeo, rayMat);
        ray.position.set(
          (Math.random() - 0.5) * 4,
          -50 + i * 0.9,
          (Math.random() - 0.5) * 4
        );
        ray.userData = { speed: 0.6 + Math.random() * 0.9 };
        scene.add(ray);
        rays.push(ray);
      }
    }

    function createInitialBlocks() {
      blocks = [
        { id: 1, reference: "Genesis 1:1" },
        { id: 2, reference: "John 3:16" },
        { id: 3, reference: "Psalm 23:1" },
        { id: 4, reference: "Matthew 6:9" },
        { id: 5, reference: "Romans 8:28" },
        { id: 6, reference: "Philippians 4:13" },
      ];
      currentIndex = blocks.length - 1;

      // Create visible 3D blocks in helix
      blocks.forEach((block, i) => {
        const angle = i * 0.42;
        const radius = 10.5;
        const x = Math.sin(angle) * radius;
        const z = Math.cos(angle) * radius * 0.85;
        const y = i * -2.8;

        const geometry = new THREE.BoxGeometry(1.95, 1.3, 1.1);
        const material = new THREE.MeshStandardMaterial({ 
          color: "#f5f0e8", 
          metalness: 0.15, 
          roughness: 0.85 
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, y, z);
        scene.add(mesh);

        // Store mesh for later scaling/animation if needed
        block.mesh = mesh;
      });
    }

    function createParticles() {
      const count = 2400;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count * 3; i += 3) {
        positions[i]     = (Math.random() - 0.5) * 70;
        positions[i + 1] = Math.random() * -140 - 40;
        positions[i + 2] = (Math.random() - 0.5) * 65;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const material = new THREE.PointsMaterial({
        size: 0.12,
        color: 0xf5e8c7,
        transparent: true,
        opacity: 0.85,
        depthWrite: false
      });

      particlesMesh = new THREE.Points(geometry, material);
      scene.add(particlesMesh);
    }

    function animate() {
      requestAnimationFrame(animate);

      // Animate light beams
      rays.forEach(ray => {
        ray.position.y += ray.userData.speed || 0.8;
        if (ray.position.y > 50) ray.position.y = -50;
        ray.material.opacity = Math.max(0.15, 1 - Math.abs(ray.position.y) / 70);
      });

      // Animate particles
      if (particlesMesh) {
        const pos = particlesMesh.geometry.attributes.position.array;
        for (let i = 1; i < pos.length; i += 3) {
          pos[i] += 0.038;
          if (pos[i] > 50) pos[i] = -140;
        }
        particlesMesh.geometry.attributes.position.needsUpdate = true;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    function updateNavButtons() {
      const nav = document.getElementById('nav-buttons');
      nav.innerHTML = '';
      blocks.forEach((block, index) => {
        const btn = document.createElement('button');
        btn.textContent = `BLOCK ${String(index + 1).padStart(2, '0')} — ${block.reference}`;
        btn.onclick = () => {
          currentIndex = index;
          console.log("Focusing block", index);
        };
        if (index === currentIndex) {
          btn.style.background = '#fff';
          btn.style.color = '#000';
        }
        nav.appendChild(btn);
      });
    }

    window.createNewBlock = function() {
      const refs = ["Genesis 1:1", "John 3:16", "Psalm 23:1", "Matthew 6:9", "Romans 8:28", "Philippians 4:13"];
      const newRef = refs[Math.floor(Math.random() * refs.length)];
      const newBlock = { id: Date.now(), reference: newRef };
      blocks.push(newBlock);
      currentIndex = blocks.length - 1;
      updateNavButtons();
      console.log("New block created");
      alert(`✅ New block created!\nVerse: ${newRef}\n+10 HOLY tokens rewarded`);
    };

    window.mockWalletConnect = function() {
      alert("✅ Wallet connected (demo mode)");
    };

    window.onload = init;
  </script>
</body>
</html>
